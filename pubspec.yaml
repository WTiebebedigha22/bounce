name: bounce_remake
description: "A Bounce game remake inspired by Nokia 5800 ExpressMusic"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  
  # Storage
  shared_preferences: ^2.5.5
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  
  # Audio
  audioplayers: ^6.2.0
  
  # Animations
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  
  # State Management
  provider: ^6.1.2
  get: ^4.7.2
  
  # Utilities
  intl: ^0.20.2
  device_preview: ^1.2.0
  
  # Ads & Analytics (Optional)
  google_mobile_ads: ^5.3.1
  firebase_analytics: ^11.4.4
  firebase_core: ^3.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Testing
  mockito: ^5.4.5
  build_runner: ^2.4.13
  
  # Code Quality
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# Flutter-specific configuration
flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/images/icons/
    - assets/sounds/
    - assets/fonts/
    - assets/animations/

  # Custom fonts
  fonts:
    - family: GameFont
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
          weight: 400
    - family: BounceFont
      fonts:
        - asset: assets/fonts/Orbitron-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-VariableFont_wght.ttf
          weight: 900

# Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#0D47A1"
  color_dark: "#0D47A1"
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png
  android: true
  ios: true
  web: true
  android_gravity: center
  ios_content_mode: center
  web_image_mode: center
  fullscreen: true
  android12:
    color: "#0D47A1"
    image: assets/images/splash_logo.png